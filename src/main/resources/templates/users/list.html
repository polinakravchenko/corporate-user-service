<!doctype html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Користувачі системи')}"></head>
<body>
<header th:replace="~{layout :: header}"></header>
<main class="container">
    <section class="card">
        <div class="page-header">
            <div>
                <h1>Користувачі системи</h1>
                <p>Адміністративний розділ: облікові дані, ролі, статуси та керування паролями.</p>
            </div>
            <a class="button primary" th:href="@{/users/new}">+ Новий customer</a>
        </div>

        <div th:if="${success}" class="alert success" th:text="${success}"></div>

        <form class="filters" method="get" th:action="@{/users}">
            <input type="text" name="query" placeholder="Пошук за username, email або ПІБ" th:value="${query}">
            <select name="status">
                <option value="">Усі статуси</option>
                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == selectedStatus}"></option>
            </select>
            <button class="button" type="submit">Фільтрувати</button>
        </form>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>ПІБ</th>
                <th>Статус</th>
                <th>Ролі</th>
                <th>Оновлено</th>
                <th>Дії</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.fullName}"></td>
                <td><span class="badge" th:classappend="${user.status}" th:text="${user.status}"></span></td>
                <td><span class="badge" th:each="role : ${user.roles}" th:text="${role.code}"></span></td>
                <td th:text="${#temporals.format(user.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="actions">
                    <a th:href="@{/users/{id}(id=${user.id})}">Перегляд</a>
                    <a th:href="@{/users/{id}/edit(id=${user.id})}">Редагувати</a>
                    <a th:href="@{/users/{id}/status(id=${user.id})}">Статус</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="8" class="empty">Користувачів не знайдено.</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
