<!doctype html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Зміна пароля')}"></head>
<body>
<header th:replace="~{layout :: header}"></header>
<main class="container narrow">
    <section class="card">
        <h1>Зміна пароля: <span th:text="${user.username}"></span></h1>
        <form method="post" th:action="@{/users/{id}/password(id=${user.id})}" th:object="${form}" class="form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div th:if="${#fields.hasGlobalErrors()}" class="alert error" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            <label>Новий пароль<input th:field="*{newPassword}" type="password"></label>
            <div class="field-error" th:errors="*{newPassword}"></div>
            <label>Підтвердження пароля<input th:field="*{confirmPassword}" type="password"></label>
            <div class="field-error" th:errors="*{confirmPassword}"></div>
            <div class="form-actions">
                <a class="button" th:href="@{/users/{id}(id=${user.id})}">Назад</a>
                <button class="button primary" type="submit">Змінити пароль</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
