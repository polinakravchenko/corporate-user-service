<!doctype html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Зміна власного пароля')}"></head>
<body>
<header th:replace="~{layout :: header}"></header>
<main class="container narrow">
    <section class="card">
        <h1>Зміна власного пароля</h1>
        <form method="post" th:action="@{/cabinet/password}" th:object="${form}" class="form">
            <div th:if="${#fields.hasGlobalErrors()}" class="alert error" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
            <label>Новий пароль<input th:field="*{newPassword}" type="password"></label>
            <div class="field-error" th:errors="*{newPassword}"></div>
            <label>Підтвердження пароля<input th:field="*{confirmPassword}" type="password"></label>
            <div class="field-error" th:errors="*{confirmPassword}"></div>
            <div class="form-actions">
                <a class="button" th:href="@{/cabinet}">Назад</a>
                <button class="button primary" type="submit">Змінити пароль</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
